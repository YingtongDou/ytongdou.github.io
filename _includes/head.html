{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
<!-- Removed unused font families (Arimo, Cabin Condensed, Roboto Condensed) to improve load time -->
<style>
  /* Social icon hover effects */
  .social-icons-bar a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease, transform 0.2s ease;
    opacity: 0.75;
  }
  .social-icons-bar a:hover {
    opacity: 1;
    transform: scale(1.15);
  }
  /* Profile header card */
  .profile-header {
    background: #fafbfc;
    border-radius: 8px;
    padding: 2em 1em 1.5em 1em;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  /* News list styling */
  .news-list li {
    padding: 0.3em 0;
    line-height: 1.5;
  }
  /* Show more pill button */
  .show-more-btn {
    display: inline-block;
    color: #7a8288;
    font-size: 0.85em;
    border: 1px solid #d3d3d3;
    border-radius: 20px;
    padding: 0.3em 1.2em;
    text-decoration: none !important;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .show-more-btn:hover {
    background: #7a8288;
    color: #fff;
  }
  /* Venue badge */
  .venue-badge {
    display: inline-block;
    font-size: 0.75em;
    font-weight: 600;
    color: #1434CB;
    background: #eef1fb;
    border-radius: 12px;
    padding: 0.15em 0.6em;
    margin-left: 0.4em;
    vertical-align: middle;
  }
  /* Talk/Blog label tags */
  .label-tag {
    display: inline-block;
    font-size: 0.75em;
    font-weight: 600;
    border-radius: 4px;
    padding: 0.1em 0.5em;
    margin-right: 0.3em;
    vertical-align: middle;
  }
  .label-talk {
    color: #fff;
    background: #1434CB;
  }
  .label-blog {
    color: #fff;
    background: #7a8288;
  }
  /* Paper titles */
  .paper-title {
    font-size: 1.05em;
  }
  /* Publication entry dividers */
  .pub-entry {
    margin-bottom: 1.2em;
    padding-bottom: 1em;
    border-bottom: 1px solid #f0f0f0;
  }
  .pub-entry:last-child {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
</style>

<meta http-equiv="cleartype" content="on">
