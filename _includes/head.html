{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css">
<style>
  /* Smooth scroll */
  html { scroll-behavior: smooth; }
  /* Social icon hover effects */
  .social-icons-bar a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease, transform 0.2s ease;
    opacity: 0.75;
  }
  .social-icons-bar a:hover {
    opacity: 1;
    transform: scale(1.15);
  }
  /* Font Awesome social icons in the bar */
  .social-icons-bar .fa-icon-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: #fff;
    font-size: 16px;
    text-decoration: none !important;
  }
  .social-icons-bar .fa-icon-link.icon-cv { background: #494e52; }
  .social-icons-bar .fa-icon-link.icon-x { background: #000; }
  .social-icons-bar .fa-icon-link.icon-linkedin { background: #0077b5; }
  .social-icons-bar .fa-icon-link.icon-scholar { background: #4285f4; }
  .social-icons-bar .fa-icon-link.icon-github { background: #171516; }
  /* Profile header card */
  .profile-header {
    background: linear-gradient(135deg, #f8f9ff, #fafbfc);
    border-radius: 8px;
    padding: 2em 1em 1.5em 1em;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  /* News list styling */
  .news-list li {
    padding: 0.3em 0;
    line-height: 1.5;
  }
  /* Show more pill button */
  .show-more-btn {
    display: inline-block;
    color: #7a8288;
    font-size: 0.85em;
    border: 1px solid #d3d3d3;
    border-radius: 20px;
    padding: 0.3em 1.2em;
    text-decoration: none !important;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .show-more-btn:hover {
    background: #7a8288;
    color: #fff;
  }
  /* Venue badge */
  .venue-badge {
    display: inline-block;
    font-size: 0.75em;
    font-weight: 600;
    color: #1434CB;
    background: #eef1fb;
    border-radius: 12px;
    padding: 0.15em 0.6em;
    margin-left: 0.4em;
    vertical-align: middle;
  }
  /* Talk/Blog label tags */
  .label-tag {
    display: inline-block;
    font-size: 0.75em;
    font-weight: 600;
    border-radius: 4px;
    padding: 0.1em 0.5em;
    margin-right: 0.3em;
    vertical-align: middle;
  }
  .label-talk {
    color: #fff;
    background: #1434CB;
  }
  .label-blog {
    color: #fff;
    background: #7a8288;
  }
  /* Paper titles */
  .paper-title {
    font-size: 1.05em;
  }
  /* Publication entry dividers */
  .pub-entry {
    margin-bottom: 1.2em;
    padding-bottom: 1em;
    border-bottom: 1px solid #f0f0f0;
  }
  .pub-entry:last-child {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  /* Scrollable expanded sections */
  .scrollable-section {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 0.5em 0.8em;
    margin-top: 0.5em;
  }
  .scrollable-section::-webkit-scrollbar {
    width: 5px;
  }
  .scrollable-section::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border-radius: 3px;
  }
  .scrollable-section::-webkit-scrollbar-track {
    background: transparent;
  }
  /* Highlight own name in author lists */
  .me { font-weight: 700; text-decoration: underline; text-decoration-color: #1434CB; text-underline-offset: 2px; }
  /* Back to top button */
  #back-to-top {
    position: fixed;
    bottom: 2em;
    right: 2em;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #7a8288;
    color: #fff;
    border: none;
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease, background 0.2s ease;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  #back-to-top.visible { opacity: 1; visibility: visible; }
  #back-to-top:hover { background: #1434CB; }
  /* Staggered section fade-in */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .page__content > * {
    animation: fadeInUp 0.5s ease both;
  }
  .page__content > *:nth-child(1) { animation-delay: 0.05s; }
  .page__content > *:nth-child(2) { animation-delay: 0.1s; }
  .page__content > *:nth-child(3) { animation-delay: 0.15s; }
  .page__content > *:nth-child(4) { animation-delay: 0.2s; }
  .page__content > *:nth-child(5) { animation-delay: 0.25s; }
  .page__content > *:nth-child(6) { animation-delay: 0.3s; }
  .page__content > *:nth-child(7) { animation-delay: 0.35s; }
  .page__content > *:nth-child(8) { animation-delay: 0.4s; }
  .page__content > *:nth-child(n+9) { animation-delay: 0.45s; }
</style>

<meta http-equiv="cleartype" content="on">
