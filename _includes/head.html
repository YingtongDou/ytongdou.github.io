{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
<!-- Removed unused font families (Arimo, Cabin Condensed, Roboto Condensed) to improve load time -->
<style>
  /* Social icon hover effects */
  .social-icons-bar a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease, transform 0.2s ease;
    opacity: 0.75;
  }
  .social-icons-bar a:hover {
    opacity: 1;
    transform: scale(1.15);
  }
  /* News list styling */
  .news-list li {
    padding: 0.3em 0;
    line-height: 1.5;
  }
</style>

<meta http-equiv="cleartype" content="on">
